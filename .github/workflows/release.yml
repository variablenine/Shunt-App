name: Build release APK

# Builds a keyless release APK and attaches it to a GitHub Release.
#
# How to cut a release:
#   1. On the repo's "Releases" page, click "Draft a new release".
#   2. Create a tag like v0.1.0-alpha, give it a title and notes, and Publish.
#   3. This workflow runs automatically and uploads the APK to that release
#      a few minutes later (refresh the release page to see it).
#
# The APK contains no API keys — install it and enter your HERE key in the app.
# You can also run this manually from the Actions tab (it produces a downloadable
# build artifact) without publishing a release.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up the Android SDK
        uses: android-actions/setup-android@v3

      - name: Build the release APK (keyless)
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Name the APK
        id: apk
        run: |
          mkdir -p dist
          version="${{ github.event.release.tag_name }}"
          [ -z "$version" ] && version="${GITHUB_SHA::7}"
          cp app/build/outputs/apk/release/app-release.apk "dist/shunt-${version}.apk"
          echo "path=dist/shunt-${version}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload as a build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: shunt-apk
          path: dist/*.apk

      - name: Attach the APK to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
